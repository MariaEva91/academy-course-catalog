<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academy — Catálogo de formaciones</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">A</span>
        <span class="logo-text">Academy</span>
      </div>
      <p class="header-tagline">Aprendé a tu ritmo. Crecé con propósito.</p>
    </div>
    <div class="header-decoration" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </header>

  <main class="main-content">

    <section class="filters-bar" id="filters">
      <div class="filters-inner">
        <div class="filter-group">
          <label for="filter-category" class="filter-label">Categoría</label>
          <div class="select-wrap">
            <select id="filter-category" class="filter-select">
              <option value="">Todas las categorías</option>
            </select>
          </div>
        </div>
        <div class="filter-group">
          <label for="filter-audience" class="filter-label">Audiencia</label>
          <div class="select-wrap">
            <select id="filter-audience" class="filter-select">
              <option value="">Todas las audiencias</option>
            </select>
          </div>
        </div>
        <div class="filter-count-wrap">
          <span class="filter-count" id="course-count">— courses</span>
        </div>
      </div>
    </section>

    <section class="catalog-section">
      <div class="catalog-grid" id="catalog-grid">
        <!-- Cards injected here -->
      </div>
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Ninguna formación coincide con los filtros.</p>
        <button id="reset-filters">Limpiar filtros</button>
      </div>
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Cargando formaciones…</p>
      </div>
      <div class="error-state hidden" id="error-state">
        <div class="error-icon">⚠️</div>
        <p id="error-message">Ocurrió un error al cargar el catálogo.</p>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Academy. Todos los derechos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
